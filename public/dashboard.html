<!DOCTYPE html>
<html>
<head>
  <title>Venatrix Dashboard</title>
  <link rel="icon" type="image/png" sizes="32x32" href="dashboard.png">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 TOAST -->
<div id="toast" style="
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(15,23,42,0.9);
  color: white;
  padding: 12px 18px;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  display: none;
  z-index: 999;
  font-size: 14px;
"></div>

<!-- 🔥 NAVBAR -->
<div class="navbar">
  <div class="brand">
    <img src="spider.png" alt="Venatrix Logo">
    <div class="brand-text">
      <h2>VENATRIX</h2>
      <span>Intelligent Information Flow</span>
    </div>
  </div>

  <div style="display:flex; gap:15px; align-items:center;">
    <span id="role" class="role"></span>
    <button onclick="logout()" style="background:#ef4444;">Logout</button>
  </div>
</div>

<div id="layout" style="display:flex;">

  <!-- 🔥 SIDEBAR -->
  <div id="sidebar" style="
    width:220px;
    padding:20px;
    border-right:1px solid rgba(255,255,255,0.05);
  ">

    <div class="sideItem active" onclick="switchTab('documents')">📄 Documents</div>
    <div class="sideItem" onclick="switchTab('users')">👥 Users</div>
    <div id="adminSide" class="sideItem" onclick="switchTab('admin')">⚙️ Admin</div>
    <div class="sideItem" onclick="switchTab('upload')">⬆️ Upload</div>

  </div>

  <!-- 🔥 MAIN CONTENT -->
  <div style="flex:1; padding:20px;">

<div id="tabs" style="
  display:flex;
  gap:10px;
  padding:15px 20px;
">

  <button onclick="switchTab('documents')" class="tab active">Documents</button>
  <button onclick="switchTab('users')" class="tab">Users</button>
  <button id="adminTab" onclick="switchTab('admin')" class="tab">Admin</button>
  <button onclick="switchTab('upload')" class="tab">Upload</button>

</div>

<div style="
  display:flex;
  gap:15px;
  padding:15px 20px;
">

  <div class="card" style="flex:1;text-align:center;">
    <h4 id="pendingCount">0</h4>
    <span style="color:#fbbf24;">Pending</span>
  </div>

  <div class="card" style="flex:1;text-align:center;">
    <h4 id="approvedCount">0</h4>
    <span style="color:#22c55e;">Approved</span>
  </div>

  <div class="card" style="flex:1;text-align:center;">
    <h4 id="rejectedCount">0</h4>
    <span style="color:#ef4444;">Rejected</span>
  </div>

</div>

<!-- 🔥 MAIN -->
<div class="container">

  <div id="uploadSection">
  <div class="card">
    <h3>Upload Document</h3>
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>
  </div>
  </div>

  <div id="adminSection" style="display:none;">
  <div class="card" id="adminPanel" style="display:none;">
    <h3>Create Workflow</h3>
    <input id="type" placeholder="Type (e.g. internship)">
    <input id="flow" placeholder="Flow (HOD,ADMIN)">
    <button onclick="createWorkflow()">Create</button>
  </div>
  </div>

  <div id="usersSection" style="display:none;">
  <div class="card" id="rolePanel" style="display:none;">
    <h3>Role Management</h3>

    <input id="roleInput" class="input-field" placeholder="Enter role (e.g. HOD)">
    <button onclick="createRole()">Add Role</button>

    <h4 style="margin-top:20px;">Existing Roles</h4>
    <div id="roleList"></div>
  </div>
  

  <div class="card" id="userPanel" style="display:none;">
    <h3>Create User</h3>

    <input id="newUser" class="input-field" placeholder="Username">
    <input id="newPass" class="input-field" placeholder="Password">

    <select id="roleSelect" class="input-field">
      <option value="" disabled selected>Select Role</option>
    </select>

    <button onclick="createUser()">Create User</button>
  </div>

  <div class="card" id="userListPanel" style="display:none;">
    <h3>Users</h3>
    <div id="userList"></div>
  </div>
  </div>

  <div id="documentsSection">
  <div class="card full">
    <h3>Documents</h3>
    <input 
    id="searchInput"
    placeholder="Search documents..."
    style="
      width:100%;
      margin-bottom:10px;
      padding:10px;
      border-radius:10px;
      background:rgba(255,255,255,0.06);
      color:white;
      border:none;
    "
    oninput="load()"
  />
    <div id="list" class="doc-list"></div>
  </div>
  </div>

  </div> <!-- main -->
  </div> <!-- layout -->

</div>

<script>

/* ===== TOAST ===== */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";

  setTimeout(() => {
    t.style.display = "none";
  }, 2500);
}

/* ===== 🔥 JWT ADDITION (NO REMOVAL) ===== */
const token = sessionStorage.getItem("token");

/* fallback to old system if token not present */
let user = JSON.parse(sessionStorage.getItem("user"));

if (token) {
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    user = payload;
  } catch {}
}

if (!user) {
  window.location = "index.html";
}

document.getElementById("role").innerText = user.role;
if (user.role !== "ADMIN") {
  const adminSide = document.getElementById("adminSide");
  if (adminSide) adminSide.style.display = "none";
}

/* ===== ADMIN VIEW ===== */
if (user.role === "ADMIN") {
  document.getElementById("adminTab").style.display = "inline-block";
  document.querySelector("[onclick=\"switchTab('admin')\"]").style.display = "block";
  if (user.role !== "ADMIN") {
    document.querySelector("[onclick=\"switchTab('admin')\"]").style.display = "none";
 }
  document.getElementById("adminPanel").style.display = "block";
  document.getElementById("rolePanel").style.display = "block";
  document.getElementById("userPanel").style.display = "block";
  document.getElementById("userListPanel").style.display = "block";

  loadRoles();
  loadRolesIntoDropdown();
  loadUsers();
}

if (user.role !== "ADMIN") {
  document.getElementById("adminTab").style.display = "none";
}

/* ===== LOGOUT ===== */
function logout() {
  sessionStorage.removeItem("user");
  sessionStorage.removeItem("token");
  window.location = "index.html";
}

/* ===== AUTH HEADER ===== */
function getHeaders(json = true) {
  const headers = {};
  if (json) headers["Content-Type"] = "application/json";
  if (token) headers["authorization"] = token;
  return headers;
}

/* ===== UPLOAD ===== */
async function upload() {
  const file = document.getElementById("file").files[0];

  if (!file) {
    showToast("Select a file first");
    return;
  }

  const fd = new FormData();
  fd.append("file", file);

  const res = await fetch("/upload", {
    method: "POST",
    headers: token ? { "authorization": token } : {},
    body: fd
  });

  // ✅ ONLY ADDITION
  if (res.ok) {
    showToast("Upload successful ✅");
  } else {
    showToast("Upload failed ❌");
  }

  load();
}

function switchTab(tab) {

  document.getElementById("uploadSection").style.display = "none";
  document.getElementById("adminSection").style.display = "none";
  document.getElementById("usersSection").style.display = "none";
  document.getElementById("documentsSection").style.display = "none";

  document.getElementById(tab + "Section").style.display = "block";

  // 🔥 sidebar active state
  document.querySelectorAll(".sideItem").forEach(i => i.classList.remove("active"));
  event.target.classList.add("active");
}

/* ===== LOAD DOCUMENTS ===== */
async function load() {
  const list = document.getElementById("list");
  list.innerHTML = "<p>Loading...</p>";

  const res = await fetch("/documents", {
    headers: token ? { "authorization": token } : {}
  });

  const docs = await res.json();
  const visibleDocs = docs.filter(doc => {
  if (user.role === "ADMIN") return true;
    return doc.flow.includes(user.role);
  });

  const pending = visibleDocs.filter(d => d.status !== "Fully Approved" && d.status !== "Rejected");
  const approved = visibleDocs.filter(d => d.status === "Fully Approved");
  const rejected = visibleDocs.filter(d => d.status === "Rejected");

document.getElementById("pendingCount").innerText = pending.length;
document.getElementById("approvedCount").innerText = approved.length;
document.getElementById("rejectedCount").innerText = rejected.length;

  list.innerHTML = "";

  const query = document.getElementById("searchInput")?.value?.toLowerCase() || "";

  docs
    .filter(doc => doc.name.toLowerCase().includes(query))
    .forEach(doc => {

      if (!doc.flow.includes(user.role) && user.role !== "ADMIN") return;

      const div = document.createElement("div");
      div.className = "doc-card";

      let btn = "";
      let rejectBtn = "";

      if (doc.flow[doc.currentStep] === user.role && doc.status !== "Rejected") {
        btn = `<button onclick="approve(${doc.id})">Approve</button>`;
        rejectBtn = `<button onclick="rejectDoc(${doc.id})" style="background:#ef4444;margin-left:8px;">Reject</button>`;
    }

    div.innerHTML = `
      <h4>${doc.name}</h4>
      <p>
  <span style="
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
    background:${
      doc.status === "Fully Approved"
        ? "rgba(34,197,94,0.15)"
        : doc.status === "Rejected"
        ? "rgba(239,68,68,0.15)"
        : "rgba(251,191,36,0.15)"
    };
    color:${
      doc.status === "Fully Approved"
        ? "#22c55e"
        : doc.status === "Rejected"
        ? "#ef4444"
        : "#fbbf24"
    };
  ">
    ${doc.status}
  </span>
</p>

<p>Current: ${doc.flow[doc.currentStep] || "Done"}</p>
<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">
  ${doc.flow.map((step, i) => {
    let color = "#334155";

    if (doc.signedBy && doc.signedBy.includes(step)) {
      color = "#22c55e"; // approved
    } else if (doc.status === "Rejected" && i === doc.currentStep) {
      color = "#ef4444"; // rejected
    } else if (i === doc.currentStep) {
      color = "#fbbf24"; // current
    }

    return `
      <span style="
        padding:4px 8px;
        border-radius:999px;
        background:${color};
        font-size:11px;
      ">
        ${step}
      </span>
    `;
  }).join("")}
</div>

${doc.signedBy && doc.signedBy.length
  ? `<p style="color:#38bdf8;">Signed by: ${doc.signedBy.join(", ")}</p>`
  : ""}

  ${doc.signedBy && doc.signedBy.length
  ? `<p style="font-size:12px;color:#94a3b8;">
       Audit: ${doc.signedBy.join(" → ")}
     </p>`
  : ""}

${doc.rejected
  ? `<p style="color:#ef4444;">Rejected: ${doc.rejectionComment}</p>`
  : ""}

${btn}
${rejectBtn}
    `;

    list.appendChild(div);
  });
}

/* ===== APPROVE DOC ===== */
async function approve(id) {
  await fetch("/approve", {
    method: "POST",
    headers: getHeaders(),
    body: JSON.stringify({ id, role: user.role })
  });

  load();
}

/* ===== ❌ REJECT DOC (NEW) ===== */
async function rejectDoc(id) {
  const comment = prompt("Enter rejection reason:");

  if (!comment) return;

  await fetch("/reject", {
    method: "POST",
    headers: getHeaders(),
    body: JSON.stringify({
      id,
      role: user.role,
      comment
    })
  });

  showToast("Rejected ❌");
  load();
}

let rejectId = null;

function rejectDoc(id) {
  rejectId = id;
  document.getElementById("rejectModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("rejectModal").style.display = "none";
}

async function submitReject() {
  const comment = document.getElementById("rejectInput").value;

  if (!comment) {
    showToast("Enter reason");
    return;
  }

  await fetch("/reject", {
    method: "POST",
    headers: getHeaders(),
    body: JSON.stringify({
      id: rejectId,
      role: user.role,
      comment
    })
  });

  closeModal();
  document.getElementById("rejectInput").value = "";
  showToast("Rejected ❌");
  load();
}

/* ===== WORKFLOW ===== */
async function createWorkflow() {
  const type = document.getElementById("type").value;
  const flow = document.getElementById("flow").value.split(",");

  if (!type || flow.length === 0) {
    showToast("Enter valid workflow");
    return;
  }

  await fetch("/create-workflow", {
    method: "POST",
    headers: getHeaders(),
    body: JSON.stringify({ type, flow })
  });

  showToast("Workflow created");
}

/* ===== ROLE ===== */
async function createRole() {
  const role = document.getElementById("roleInput").value;

  if (!role) {
    showToast("Enter role name");
    return;
  }

  await fetch("/create-role", {
    method: "POST",
    headers: getHeaders(),
    body: JSON.stringify({
      role,
      institute: user.institute
    })
  });

  document.getElementById("roleInput").value = "";

  loadRoles();
  loadRolesIntoDropdown();
}

/* ===== LOAD ROLES ===== */
async function loadRoles() {
  const res = await fetch(`/roles/${user.institute}`, {
    headers: token ? { "authorization": token } : {}
  });

  const roles = await res.json();

  const list = document.getElementById("roleList");
  const pending = docs.filter(d => d.status !== "Fully Approved" && d.status !== "Rejected");
  const approved = docs.filter(d => d.status === "Fully Approved");
  const rejected = docs.filter(d => d.status === "Rejected");

list.innerHTML = `
  <h3 style="color:#fbbf24;">⏳ Pending (${pending.length})</h3>
  <div id="pendingList"></div>

  <h3 style="color:#22c55e;margin-top:20px;">✅ Approved (${approved.length})</h3>
  <div id="approvedList"></div>

  <h3 style="color:#ef4444;margin-top:20px;">❌ Rejected (${rejected.length})</h3>
  <div id="rejectedList"></div>
`;

  roles.forEach(r => {
    const div = document.createElement("div");
    div.className = "doc-card";
    div.innerText = r;
    if (doc.status === "Rejected") {
  document.getElementById("rejectedList").appendChild(div);
  } else if (doc.status === "Fully Approved") {
    document.getElementById("approvedList").appendChild(div);
  } else {
    document.getElementById("pendingList").appendChild(div);
  }
  });
}

/* ===== DROPDOWN ===== */
async function loadRolesIntoDropdown() {
  const res = await fetch(`/roles/${user.institute}`, {
    headers: token ? { "authorization": token } : {}
  });

  const roles = await res.json();

  const select = document.getElementById("roleSelect");
  select.innerHTML = `<option disabled selected>Select Role</option>`;

  roles.forEach(role => {
    if (role === "ADMIN") return;

    const option = document.createElement("option");
    option.value = role;
    option.innerText = role;
    select.appendChild(option);
  });
}

/* ===== CREATE USER ===== */
async function createUser() {
  const username = document.getElementById("newUser").value;
  const password = document.getElementById("newPass").value;
  const role = document.getElementById("roleSelect").value;

  if (!username || !password || !role) {
    showToast("Fill all fields");
    return;
  }

  const res = await fetch("/create-user", {
    method: "POST",
    headers: getHeaders(),
    body: JSON.stringify({
      username,
      password,
      role,
      institute: user.institute
    })
  });

  if (!res.ok) {
    const msg = await res.text();
    showToast(msg);
    return;
  }

  showToast("User created");

  document.getElementById("newUser").value = "";
  document.getElementById("newPass").value = "";

  loadUsers();
}

/* ===== LOAD USERS ===== */
async function loadUsers() {
  const res = await fetch(`/users/${user.institute}`, {
    headers: token ? { "authorization": token } : {}
  });

  const users = await res.json();

  const list = document.getElementById("userList");
  list.innerHTML = "";

  users.forEach(u => {
    const div = document.createElement("div");
    div.className = "doc-card";

    if (u.role === "PENDING") {
      div.innerHTML = `
        <strong>${u.username}</strong> — PENDING
        <br>
        <button onclick="approveUser('${u.username}')">Approve</button>
      `;
    } else {
      div.innerText = `${u.username} — ${u.role}`;
    }

    list.appendChild(div);
  });
}

/* ===== APPROVE USER ===== */
async function approveUser(username) {
  const role = prompt("Enter role (e.g. HOD)");

  if (!role) return;

  const res = await fetch("/approve-user", {
    method: "POST",
    headers: getHeaders(),
    body: JSON.stringify({
      username,
      institute: user.institute,
      role
    })
  });

  if (!res.ok) {
    const msg = await res.text();
    showToast(msg);
    return;
  }

  showToast("User approved");
  loadUsers();
}

/* ===== INIT ===== */
load();
if (user.role === "ADMIN") {
  switchTab("admin");
} else {
  switchTab("documents");
}

</script>

<!-- 🔥 REJECT MODAL -->
<div id="rejectModal" style="
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
">

  <div style="
    background: #020617;
    padding: 25px;
    border-radius: 16px;
    width: 300px;
    box-shadow: 0 0 30px rgba(0,0,0,0.7);
  ">
    <h3>Reject Document</h3>

    <textarea id="rejectInput"
      placeholder="Enter reason..."
      style="width:100%;padding:10px;border-radius:10px;background:#111827;color:white;border:none;">
    </textarea>

    <div style="margin-top:15px;display:flex;justify-content:space-between;">
      <button onclick="submitReject()">Reject</button>
      <button onclick="closeModal()" style="background:#334155;">Cancel</button>
    </div>
  </div>

</div>

</body>
</html>
