<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venatrix — Login</title>
  <link rel="icon" type="image/png" href="spider.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow: auto; }

    .login-bg { min-height: 100vh; }

    /* Step transitions */
    .step { display: none; animation: section-in 0.4s var(--ease-spring) both; }
    .step.active { display: block; }

    /* OTP resend */
    .resend-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .resend-btn {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: var(--accent-teal);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .resend-btn:hover { opacity: 0.7; transform: none; box-shadow: none; }
    .resend-btn:disabled { color: var(--text-muted); cursor: default; }

    #countdown {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Progress dots */
    .progress-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .progress-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border-subtle);
      transition: all 0.3s var(--ease-smooth);
    }

    .progress-dot.active {
      background: var(--accent-teal);
      box-shadow: 0 0 8px var(--accent-teal);
      width: 24px;
      border-radius: 99px;
    }

    .progress-dot.done {
      background: var(--accent-green);
    }

    /* Floating label inputs */
    .float-group {
      position: relative;
      margin-bottom: 14px;
    }

    .float-group input {
      width: 100%;
      padding: 16px 16px 8px;
      margin: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 15px;
      transition: all 0.25s;
    }

    .float-group label {
      position: absolute;
      left: 16px;
      top: 14px;
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
      transition: all 0.2s var(--ease-smooth);
    }

    .float-group input:focus,
    .float-group input:not(:placeholder-shown) {
      border-color: rgba(0,229,200,0.3);
      background: var(--bg-hover);
      box-shadow: 0 0 0 3px rgba(0,229,200,0.08);
    }

    .float-group input:focus + label,
    .float-group input:not(:placeholder-shown) + label {
      top: 5px;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent-teal);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Check mark animation */
    .check-wrap {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(34,217,122,0.1);
      border: 2px solid var(--accent-green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 20px;
      animation: check-pop 0.5s var(--ease-spring);
    }

    @keyframes check-pop {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0); opacity: 1; }
    }

    .tagline-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 99px;
      background: rgba(0,229,200,0.06);
      border: 1px solid rgba(0,229,200,0.15);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 28px;
    }

    .tagline-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent-teal);
      animation: dot-pulse 2s infinite;
    }
  </style>
</head>

<body>
<div class="login-bg">
  <div class="login-grid"></div>

  <div class="login-card">

    <div style="text-align:center">
      <div class="login-logo-wrap">
        <img src="spider.png" class="login-logo" alt="Venatrix">
        <div>
          <div class="login-brand-name">VENATRIX</div>
          <div class="login-brand-sub">Intelligent Information Flow</div>
        </div>
      </div>

      <div class="tagline-badge">
        <span class="tagline-dot"></span>
        Secure · Intelligent · Autonomous
      </div>
    </div>

    <!-- ─── MODE TABS ─── -->
    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" id="loginTabBtn" onclick="switchMode('login')">Login</button>
      <button class="mode-tab" id="signupTabBtn" onclick="switchMode('signup')">Sign Up</button>
    </div>

    <!-- ══════ LOGIN ══════ -->
    <div id="loginForm" class="step active">
      <div class="float-group">
        <input type="text" id="loginInstitute" list="instituteOptions" placeholder=" ">
        <label>Institute</label>
        <datalist id="instituteOptions">
          <option value="RVCE">
        </datalist>
      </div>

      <div class="float-group">
        <input type="text" id="loginUser" placeholder=" " autocomplete="username">
        <label>Username</label>
      </div>

      <div class="float-group">
        <input type="password" id="loginPass" placeholder=" " autocomplete="current-password">
        <label>Password</label>
      </div>

      <button class="btn btn-primary btn-full" onclick="login()" style="margin-top:4px;">
        Login
      </button>
    </div>

    <!-- ══════ SIGNUP — STEP 1: Details ══════ -->
    <div id="signupStep1" class="step">
      <div class="progress-dots">
        <div class="progress-dot active" id="dot1"></div>
        <div class="progress-dot" id="dot2"></div>
        <div class="progress-dot" id="dot3"></div>
      </div>

      <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;font-family:'JetBrains Mono',monospace;">
        STEP 1 — Account Details
      </div>

      <div class="float-group">
        <input type="text" id="signupInstitute" list="instituteOptions2" placeholder=" ">
        <label>Institute</label>
        <datalist id="instituteOptions2">
          <option value="RVCE">
        </datalist>
      </div>

      <div class="float-group">
        <input type="text" id="signupUser" placeholder=" " autocomplete="username">
        <label>Username</label>
      </div>

      <div class="float-group">
        <input type="password" id="signupPass" placeholder=" " autocomplete="new-password">
        <label>Password</label>
      </div>

      <div class="float-group">
        <input type="email" id="signupEmail" placeholder=" " autocomplete="email">
        <label>Institute Email</label>
      </div>

      <button class="btn btn-primary btn-full" onclick="signupStep1()" style="margin-top:4px;">
        Continue →
      </button>
    </div>

    <!-- ══════ SIGNUP — STEP 2: OTP ══════ -->
    <div id="signupStep2" class="step">
      <div class="progress-dots">
        <div class="progress-dot done" id="dot1b"></div>
        <div class="progress-dot active" id="dot2b"></div>
        <div class="progress-dot" id="dot3b"></div>
      </div>

      <div style="font-size:13px;color:var(--text-muted);margin-bottom:6px;font-family:'JetBrains Mono',monospace;">
        STEP 2 — Verify Email
      </div>

      <div style="font-size:14px;color:var(--text-secondary);margin-bottom:20px;line-height:1.5;">
        A 6-digit verification code was sent to<br>
        <strong id="otpEmailDisplay" style="color:var(--accent-teal)"></strong>
      </div>

      <div class="otp-wrap">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" oninput="otpAdvance(this, 0)">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" oninput="otpAdvance(this, 1)">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" oninput="otpAdvance(this, 2)">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" oninput="otpAdvance(this, 3)">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" oninput="otpAdvance(this, 4)">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" oninput="otpAdvance(this, 5)">
      </div>

      <div class="resend-row">
        <button class="resend-btn" id="resendBtn" onclick="resendOtp()" disabled>Resend OTP</button>
        <span id="countdown"></span>
      </div>

      <button class="btn btn-primary btn-full" onclick="verifyOtp()" style="margin-top:16px;">
        Verify & Continue →
      </button>
      <button class="btn btn-ghost btn-full" onclick="goBackToStep1()" style="margin-top:8px;">
        ← Back
      </button>
    </div>

    <!-- ══════ SIGNUP — STEP 3: Success ══════ -->
    <div id="signupStep3" class="step">
      <div class="progress-dots">
        <div class="progress-dot done"></div>
        <div class="progress-dot done"></div>
        <div class="progress-dot active"></div>
      </div>

      <div class="check-wrap">✓</div>

      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:18px;font-weight:700;margin-bottom:8px;">Account Created!</div>
        <div style="font-size:14px;color:var(--text-muted);line-height:1.6;">
          Your account is pending admin approval.<br>
          You'll be able to login once approved.
        </div>
      </div>

      <button class="btn btn-primary btn-full" onclick="switchMode('login')">
        Go to Login
      </button>
    </div>

  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ════════════════════════════════════
   VENATRIX LOGIN — v2.0
════════════════════════════════════ */

let currentMode = "login";
let countdownInterval = null;
let pendingSignupData = null;

/* ── TOAST ── */
function showToast(msg, type = "info") {
  const t = document.getElementById("toast");
  const icons = { info: "ℹ️", success: "✅", error: "❌", warn: "⚠️" };
  t.innerHTML = `<span>${icons[type] || "ℹ️"}</span><span>${msg}</span>`;
  t.style.display = "flex";
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.style.display = "none"; }, 3500);
}

/* ── MODE SWITCH ── */
function switchMode(mode) {
  currentMode = mode;
  document.getElementById("loginTabBtn").classList.toggle("active", mode === "login");
  document.getElementById("signupTabBtn").classList.toggle("active", mode === "signup");

  hideAll();
  if (mode === "login") {
    document.getElementById("loginForm").classList.add("active");
  } else {
    document.getElementById("signupStep1").classList.add("active");
  }
}

function hideAll() {
  ["loginForm","signupStep1","signupStep2","signupStep3"].forEach(id => {
    document.getElementById(id).classList.remove("active");
  });
}

/* ── LOGIN ── */
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    if (currentMode === "login") login();
  }
});

async function login() {
  const username  = document.getElementById("loginUser").value.trim();
  const password  = document.getElementById("loginPass").value;
  const institute = document.getElementById("loginInstitute").value.trim();

  if (!username || !password || !institute) {
    showToast("Fill all fields", "warn"); return;
  }

  const btn = document.querySelector("#loginForm .btn-primary");
  btn.textContent = "Logging in…";
  btn.disabled = true;

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password, institute })
    });

    if (res.ok) {
      const data = await res.json();
      sessionStorage.setItem("token", data.token);
      showToast("Welcome back!", "success");
      setTimeout(() => { window.location = "dashboard.html"; }, 500);
    } else {
      showToast(await res.text(), "error");
      btn.textContent = "Login";
      btn.disabled = false;
    }
  } catch(e) {
    showToast("Network error", "error");
    btn.textContent = "Login";
    btn.disabled = false;
  }
}

/* ── SIGNUP STEP 1 ── */
async function signupStep1() {
  const username  = document.getElementById("signupUser").value.trim();
  const password  = document.getElementById("signupPass").value;
  const email     = document.getElementById("signupEmail").value.trim().toLowerCase();
  const institute = document.getElementById("signupInstitute").value.trim();

  if (!username || !password || !email || !institute) {
    showToast("Fill all fields", "warn"); return;
  }

  if (!email.endsWith("@rvce.edu.in")) {
    showToast("Use your RVCE institute email only", "error");
    return;
  }

  if (password.length < 6) {
    showToast("Password must be at least 6 characters", "warn"); return;
  }

  const btn = document.querySelector("#signupStep1 .btn-primary");
  btn.textContent = "Sending OTP…";
  btn.disabled = true;

  try {
    const res = await fetch("/send-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password, email, institute })
    });

    if (res.ok) {
      pendingSignupData = { username, password, email, institute };
      document.getElementById("otpEmailDisplay").textContent = email;
      hideAll();
      document.getElementById("signupStep2").classList.add("active");
      startCountdown();
      document.querySelector(".otp-box").focus();
    } else {
      showToast(await res.text(), "error");
    }
  } catch(e) {
    showToast("Network error", "error");
  }

  btn.textContent = "Continue →";
  btn.disabled = false;
}

/* ── OTP INPUT ── */
function otpAdvance(input, idx) {
  input.value = input.value.replace(/\D/g, "");
  const boxes = document.querySelectorAll(".otp-box");
  if (input.value && idx < 5) boxes[idx + 1].focus();
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Backspace") {
    const boxes = document.querySelectorAll(".otp-box");
    const active = document.activeElement;
    const idx = Array.from(boxes).indexOf(active);
    if (idx > 0 && !active.value) boxes[idx - 1].focus();
  }
});

function getOtp() {
  return Array.from(document.querySelectorAll(".otp-box")).map(b => b.value).join("");
}

/* ── VERIFY OTP ── */
async function verifyOtp() {
  const otp = getOtp();
  if (otp.length !== 6) { showToast("Enter complete 6-digit OTP", "warn"); return; }

  const btn = document.querySelector("#signupStep2 .btn-primary");
  btn.textContent = "Verifying…";
  btn.disabled = true;

  try {
    const res = await fetch("/verify-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...pendingSignupData, otp })
    });

    if (res.ok) {
      clearInterval(countdownInterval);
      hideAll();
      document.getElementById("signupStep3").classList.add("active");
    } else {
      showToast(await res.text(), "error");
      document.querySelectorAll(".otp-box").forEach(b => {
        b.value = "";
        b.style.borderColor = "var(--accent-red)";
        setTimeout(() => b.style.borderColor = "", 1500);
      });
      document.querySelectorAll(".otp-box")[0].focus();
    }
  } catch(e) {
    showToast("Network error", "error");
  }

  btn.textContent = "Verify & Continue →";
  btn.disabled = false;
}

/* ── RESEND OTP ── */
async function resendOtp() {
  if (!pendingSignupData) return;

  const res = await fetch("/send-otp", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(pendingSignupData)
  });

  if (res.ok) {
    showToast("New OTP sent", "success");
    document.querySelectorAll(".otp-box").forEach(b => b.value = "");
    document.querySelectorAll(".otp-box")[0].focus();
    startCountdown();
  } else {
    showToast(await res.text(), "error");
  }
}

function goBackToStep1() {
  clearInterval(countdownInterval);
  hideAll();
  document.getElementById("signupStep1").classList.add("active");
}

/* ── COUNTDOWN ── */
function startCountdown() {
  clearInterval(countdownInterval);
  let secs = 60;
  const btn = document.getElementById("resendBtn");
  const counter = document.getElementById("countdown");
  btn.disabled = true;
  counter.textContent = `${secs}s`;

  countdownInterval = setInterval(() => {
    secs--;
    counter.textContent = `${secs}s`;
    if (secs <= 0) {
      clearInterval(countdownInterval);
      btn.disabled = false;
      counter.textContent = "";
    }
  }, 1000);
}
</script>

</body>
</html>
